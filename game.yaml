gdl: 1

game:
  id: paralives
  name: Paralives
  executable: Paralives.exe
  requiredFiles:
    - Paralives.exe
  logo: gameart.webp
  nexusDomain: paralives

stores:
  steam: 1118520

context:
  localModsPath: "${appDataLocalLow}/Paralives/Paralives"

modTypes:
  - id: paralives-mod
    name: Paralives Mod
    path: "${localModsPath}"
  - id: paralives-overlay
    name: Paralives Overlay
    path: "${installPath}"

installers:
  # .mod folders (contain .mod.meta) → LocalLow
  - id: paralives-mod
    priority: 80
    when: { hasFile: "**/*.mod.meta" }
    anchor: "**/*.mod.meta"
    take: archive-root
    placeAt: "."
    modType: paralives-mod

  # Everything else → install dir overlay (catch-all)
  - id: paralives-overlay
    priority: 90
    when: { hasFile: "**/*" }
    anchor: "**/*"
    take: archive-root
    placeAt: "."
    modType: paralives-overlay

nexus:
  modId: 1917
  fileGroupId: 7446440
  displayName: Paralives Support for Vortex

tests:
  corpus: off
  cases:
    - name: mod folder with .mod.meta goes to LocalLow
      archive:
        - CustomFurniture.mod/CustomFurniture.mod.meta
        - CustomFurniture.mod/Furniture/Chair/Chair.asset
        - CustomFurniture.mod/Furniture/Chair/Chair.asset.meta
      expect:
        matched: paralives-mod
        modType: paralives-mod
        plan:
          - ./CustomFurniture.mod/CustomFurniture.mod.meta
          - ./CustomFurniture.mod/Furniture/Chair/Chair.asset
          - ./CustomFurniture.mod/Furniture/Chair/Chair.asset.meta

    - name: loose file overlay drops to install root
      archive:
        - MyMod/textures/foo.png
        - MyMod/readme.txt
      expect:
        matched: paralives-overlay
        modType: paralives-overlay
        plan:
          - ./MyMod/textures/foo.png
          - ./MyMod/readme.txt

    - name: nested archive root passes through unchanged
      archive:
        - wrapper/MyMod/data.bin
      expect:
        matched: paralives-overlay
        modType: paralives-overlay
        plan:
          - ./wrapper/MyMod/data.bin
