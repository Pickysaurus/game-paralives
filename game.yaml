gdl: 1

game:
  id: paralives
  name: Paralives
  executable: Paralives.exe
  requiredFiles:
    - Paralives.exe
  logo: gameart.webp
  nexusDomain: paralives

stores:
  steam: 1118520

modTypes:
  - id: paralives-overlay
    name: Paralives Overlay
    path: "${installPath}"

installers:
  - id: paralives-overlay
    priority: 90
    when: { hasFile: "**/*" }
    anchor: "**/*"
    take: archive-root
    placeAt: "${installPath}"
    modType: paralives-overlay

nexus:
  modId: 1917
  fileGroupId: 7446440
  displayName: Paralives Support for Vortex

tests:
  corpus: off
  cases:
    - name: loose file overlay drops to install root
      archive:
        - MyMod/textures/foo.png
        - MyMod/readme.txt
      expect:
        matched: paralives-overlay
        modType: paralives-overlay
        plan:
          - /games/Hello/MyMod/textures/foo.png
          - /games/Hello/MyMod/readme.txt

    - name: nested archive root passes through unchanged
      archive:
        - wrapper/MyMod/data.bin
      expect:
        matched: paralives-overlay
        modType: paralives-overlay
        plan:
          - /games/Hello/wrapper/MyMod/data.bin
