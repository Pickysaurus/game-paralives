gdl: 1

game:
  id: paralives
  name: Paralives
  executable: Paralives.exe
  requiredFiles:
    - Paralives.exe
  logo: gameart.webp

stores:
  steam: 1118520

modTypes: []     # added in Task 6

installers: []   # added in Task 6

nexus:
  modId: 1          # PLACEHOLDER — set to the real Nexus mod-page id once the listing exists
  fileGroupId: 1    # PLACEHOLDER — set to the real file-group id once the listing exists
  displayName: Paralives Support for Vortex

tests:
  corpus: off
  cases:
    - name: loose file overlay drops to install root
      archive:
        - MyMod/textures/foo.png
        - MyMod/readme.txt
      expect:
        matched: paralives-overlay
        modType: paralives-overlay
        plan:
          - ${installPath}/MyMod/textures/foo.png
          - ${installPath}/MyMod/readme.txt

    - name: nested archive root passes through unchanged
      archive:
        - wrapper/MyMod/data.bin
      expect:
        matched: paralives-overlay
        modType: paralives-overlay
        plan:
          - ${installPath}/wrapper/MyMod/data.bin
